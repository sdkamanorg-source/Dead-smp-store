<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeadlyMC Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <h1>🔥 DeadlyMC</h1>
  <nav>
    <a href="#ranks">Ranks</a>
    <a href="#keys">Keys</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Welcome to DeadlyMC Store</h2>
  <p>Buy Exclusive Ranks & Crate Keys</p>
  <button onclick="scrollToSection('ranks')">Shop Now</button>
</section>

<!-- RANKS -->
<section id="ranks">
  <h2>💎 Ranks</h2>
  <div class="card-container">

    <div class="card">
      <h3>Eternal</h3>
      <p>₹149/month</p>
      <button onclick="buy('Eternal Rank')">Buy Now</button>
    </div>

    <div class="card">
      <h3>Titan</h3>
      <p>₹279/month</p>
      <button onclick="buy('Titan Rank')">Buy Now</button>
    </div>

    <div class="card">
      <h3>Deadly</h3>
      <p>₹379/month</p>
      <button onclick="buy('Deadly Rank')">Buy Now</button>
    </div>

    <div class="card highlight">
      <h3>Deadly+</h3>
      <p>₹699/month</p>
      <button onclick="buy('Deadly+ Rank')">Buy Now</button>
    </div>

  </div>
</section>

<!-- KEYS -->
<section id="keys">
  <h2>🔑 Crate Keys</h2>
  <div class="card-container">

    <div class="card">
      <h3>Epic Key</h3>
      <p>₹39</p>
      <button onclick="buy('Epic Key')">Buy Now</button>
    </div>

    <div class="card">
      <h3>Muffin Key</h3>
      <p>₹49</p>
      <button onclick="buy('Muffin Key')">Buy Now</button>
    </div>

    <div class="card">
      <h3>Cosmic Key</h3>
      <p>₹69</p>
      <button onclick="buy('Cosmic Key')">Buy Now</button>
    </div>

    <div class="card">
      <h3>Crimson Key</h3>
      <p>₹119</p>
      <button onclick="buy('Crimson Key')">Buy Now</button>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 DeadlyMC Server</p>
</footer>

<script src="script.js"></script>
</body>
</html>
