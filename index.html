<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeadlyMC Premium Store</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="particles"></canvas>

<div class="overlay">
<h1 class="title">⚡ DEADLYMC STORE ⚡</h1>
<p class="subtitle">Upgrade Your Power • Dominate the SMP</p>

<div class="section">
<h2>Ranks</h2>
<div class="container">
<div class="card"><h3>Vote Crate</h3><p>Free Reward</p><button class="btn">CLAIM</button></div>
<div class="card"><h3>Enteranal</h3><p class="price">₹149/mo</p><button class="btn">BUY</button></div>
<div class="card"><h3>Titan</h3><p class="price">₹279/mo</p><button class="btn">BUY</button></div>
<div class="card"><h3>Deadly</h3><p class="price">₹379/mo</p><button class="btn">BUY</button></div>
<div class="card"><h3>Deadly+</h3><p class="price">₹699/mo</p><button class="btn">BUY</button></div>
</div>
</div>

<div class="section">
<h2>Crates</h2>
<div class="container">
<div class="card"><h3>Vote Crate</h3><p>Free Reward</p><button class="btn">CLAIM</button></div>
<div class="card"><h3>Epic x4</h3><p class="price">₹39</p><button class="btn">BUY</button></div>
<div class="card"><h3>Muffin x4</h3><p class="price">₹49</p><button class="btn">BUY</button></div>
<div class="card"><h3>King x4</h3><p class="price">₹69</p><button class="btn">BUY</button></div>
<div class="card"><h3>Cosmic x4</h3><p class="price">₹119</p><button class="btn">BUY</button></div>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
